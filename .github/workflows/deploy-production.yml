# Deploy the production environment on every push to `main`.
# Target: blackbrowedlabs.com (Cloudflare Workers, Custom Domain).
# See docs/TECH_STACK.md §3 and §10.2.

name: Deploy — production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  # Force JS-based actions to run on Node 24 (forward-defense for Node 20 deprecation
  # — GitHub: 2026-06-02 default flip, 2026-09-16 removal). Closes backlog #6.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy to blackbrowedlabs.com
    runs-on: ubuntu-latest
    env:
      PUBLIC_ENVIRONMENT: production
      PUBLIC_SITE_URL: https://blackbrowedlabs.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          PUBLIC_CWA_TOKEN: ${{ secrets.PUBLIC_CWA_TOKEN }}
        run: npm run build

      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: deploy --env production
