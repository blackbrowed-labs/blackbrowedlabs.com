# Deploy the staging environment on every push to `dev`.
# Target: dev.blackbrowedlabs.com (Cloudflare Workers, Custom Domain).
# See docs/TECH_STACK.md §3 and §10.2.

name: Deploy — staging

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Serialise staging deploys so two pushes in quick succession don't race.
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to dev.blackbrowedlabs.com
    runs-on: ubuntu-latest
    env:
      PUBLIC_ENVIRONMENT: staging
      PUBLIC_SITE_URL: https://dev.blackbrowedlabs.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging
