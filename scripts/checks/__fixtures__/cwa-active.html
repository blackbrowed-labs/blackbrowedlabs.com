<body>
<h1>Data Retention</h1>
<p>
  Cloudflare Web Analytics retains aggregated page view counts for
  <strong>6 months</strong>. After that period, all aggregated metrics
  are deleted.
</p>
<p>
  Cloudflare does not retain or expose raw event-level data to customers;
  only aggregated counts are made available through the dashboard and
  GraphQL API.
</p>
